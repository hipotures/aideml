# path to the task data directory
data_dir: null

# either provide a path to a plaintext file describing the task
desc_file: null
# or provide the task goal (and optionally evaluation information) as arguments
goal: null
eval: null

log_dir: logs
workspace_dir: workspaces

# whether to unzip any archives in the data directory
preprocess_data: True
# whether to copy the data to the workspace directory (otherwise it will be symlinked)
# copying is recommended to prevent the agent from accidentally modifying the original data
copy_data: True

exp_name: null # a random experiment name will be generated if not provided

# settings for code execution
exec:
  timeout: 3600
  agent_file_name: runfile.py
  format_tb_ipython: False
  memory_limit_gb: 80

generate_report: True
# LLM settings for final report from journal
report:
  model: gpt-5.4-mini
  temp: 1.0
  reasoning_effort: low

# optional external Codex research advisor
research:
  enabled: False
  every_steps: 10
  top_k_best: 5
  top_k_worst: 5
  previous_summary_count: 5
  timeout: 900
  model: gpt-5.4-mini
  reasoning_effort: low

# optional external Codex solution synthesis
synthesis:
  enabled: False
  every_scored_steps: 15
  top_k: 5
  source_runs: []
  score_round_decimals: 5
  prediction_round_decimals: 5
  prediction_similarity_rmse_threshold: 0.015
  timeout: 900
  model: gpt-5.4-mini
  reasoning_effort: low

# agent hyperparams
agent:
  # how many improvement iterations to run
  steps: 20
  # code generation mode: legacy writes full ML scripts; autogluon_preprocess
  # asks the LLM for feature preprocessing only and uses a fixed AutoGluon runner
  mode: legacy
  # whether to instruct the agent to use CV (set to 1 to disable)
  k_fold_validation: 5
  # whether to instruct the agent to generate a prediction function
  expose_prediction: False
  # whether to provide the agent with a preview of the data
  data_preview: True

  # LLM settings for coding
  code:
    model: gpt-5.4-mini
    temp: 0.5
    reasoning_effort: low

  # LLM settings for evaluating program output / tracebacks
  feedback:
    model: gpt-5.4-mini
    temp: 0.5
    reasoning_effort: low

  # hyperparameters for the tree search
  search:
    max_debug_depth: 3
    debug_prob: 0.5
    num_drafts: 5

  autogluon:
    # Named profiles for the fixed AutoGluon runner.
    profile: full_boost
    profiles:
      fast_boost:
        included_model_types: [XGB, GBM]
        presets: medium_quality
        time_limit: 600
        use_gpu: false
        validation_strategy: holdout
        fit_args:
          save_space: true
          fit_weighted_ensemble: false
          auto_stack: false
      full_boost:
        included_model_types: [XGB, GBM, CAT]
        presets: medium_quality
        time_limit: 600
        use_gpu: false
        validation_strategy: holdout
        fit_args:
          save_space: true
          fit_weighted_ensemble: false
          auto_stack: false
      full_boost_gpu:
        included_model_types: [XGB, GBM, CAT]
        presets: medium_quality
        time_limit: 600
        use_gpu: true
        validation_strategy: holdout
        hyperparameters:
          GBM:
            - ag_args_fit:
                num_gpus: 0
          CAT:
            - task_type: GPU
              devices: "0"
              ag_args_fit:
                num_gpus: 1
          XGB:
            - device: cuda
              tree_method: hist
              n_jobs: 8
              ag_args_fit:
                num_gpus: 1
        fit_args:
          save_space: true
          fit_weighted_ensemble: false
          auto_stack: false
      best_boost_gpu_30m:
        included_model_types: [XGB, GBM, CAT]
        presets: best
        time_limit: 1800
        use_gpu: true
        hyperparameters:
          GBM:
            - ag_args_fit:
                num_gpus: 0
          CAT:
            - task_type: GPU
              devices: "0"
              ag_args_fit:
                num_gpus: 1
          XGB:
            - device: cuda
              tree_method: hist
              n_jobs: 8
              ag_args_fit:
                num_gpus: 1
        fit_args:
          save_space: true

      full_best_30m:
        included_model_types: [XGB, GBM, CAT]
        presets: best_quality
        time_limit: 1800
      full_best_30m_gpu:
        included_model_types: [XGB, GBM, CAT]
        presets: best_quality
        time_limit: 1800
        use_gpu: true
        hyperparameters:
          GBM:
            - ag_args_fit:
                num_gpus: 0
          CAT:
            - task_type: GPU
              devices: "0"
              ag_args_fit:
                num_gpus: 1
          XGB:
            - device: cuda
              tree_method: hist
              n_jobs: 8
              ag_args_fit:
                num_gpus: 1
    # Fallback values used only if a profile does not define a field.
    presets: medium_quality
    time_limit: 600
    validation_fraction: 0.2
    seed: 42
    eval_metric: auto
    included_model_types: null
    validation_strategy: null
    use_gpu: null
    hyperparameters: null
    fit_args: null

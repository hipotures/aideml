# path to the task data directory
data_dir: null

# either provide a path to a plaintext file describing the task
desc_file: null
# or provide the task goal (and optionally evaluation information) as arguments
goal: null
eval: null

log_dir: logs
workspace_dir: workspaces

# whether to unzip any archives in the data directory
preprocess_data: True
# whether to copy the data to the workspace directory (otherwise it will be symlinked)
# copying is recommended to prevent the agent from accidentally modifying the original data
copy_data: True

exp_name: null # a random experiment name will be generated if not provided

# settings for code execution
exec:
  timeout: 3600
  agent_file_name: runfile.py
  format_tb_ipython: False
  memory_limit_gb: 80

generate_report: True
# LLM settings for final report from journal
report:
  model: gpt-5.4-mini
  temp: 1.0
  reasoning_effort: low

# optional external Codex research advisor
research:
  enabled: False
  mode: llm
  # Hypothesis pipeline phase gates. execute=true has no effect when
  # materialize=false because no code exists to run.
  materialize: True
  execute: True
  every_steps: 10
  top_k_best: 5
  top_k_worst: 5
  previous_summary_count: 5
  timeout: 900
  root_hypothesis_model: gpt-5.4-mini
  reasoning_effort: low
  manual_sample_size: 3
  manual_seed: 42
  hypothesis_root_limit: 100
  # default: stable randomized root ordering with usage de-duplication.
  # manifest_score: prioritize roots by the best numeric score recorded in
  # code_manifest.json for hypothesis_root_score_mode.
  hypothesis_root_order: default
  hypothesis_root_score_mode: autogluon
  # Number of concurrent hypothesis ROOT code generations in --generate-only.
  # Valid range is 1..8. Default 1 preserves serial behavior.
  hypothesis_root_generate_workers: 1
  # If true, a new hypothesis run starts with already executed/scored ROOT code
  # from code_manifest.json materialized as completed tree nodes. Ignored on
  # --resume. Seeded ROOTs are selectable by the scheduler but do not consume
  # agent.steps.
  seed_scored_roots: True
  # If true, manual hypothesis selection treats every enabled hypothesis as
  # compatible with the current agent mode. Useful for deriving AutoGluon
  # experiments from legacy-only hypotheses.
  ignore_hypothesis_agent_modes: False

# optional external Codex solution synthesis
synthesis:
  enabled: False
  every_scored_steps: 15
  top_k: 5
  # current = use only this run; all = scan sibling log runs. Explicit
  # source_runs below overrides this scope.
  source_scope: current
  source_runs: []
  score_round_decimals: 5
  prediction_round_decimals: 5
  prediction_similarity_sample_size: 200
  prediction_similarity_min_common_sample_size: 100
  prediction_similarity_rmse_threshold: 0.015
  timeout: 900
  model: gpt-5.4-mini
  reasoning_effort: low

# optional non-invasive refactor pass after legacy response.py generation
refactor:
  enabled: False
  timeout: 300
  max_input_chars: 240000
  model: gpt-5.4-mini
  reasoning_effort: low

# optional read-only live web dashboard for the current run
web:
  enabled: False
  host: 0.0.0.0
  port: 8766
  refresh_seconds: 2.0

# agent hyperparams
agent:
  # how many improvement iterations to run
  steps: 20
  # Number of initial ROOT hypotheses to test before expanding scored nodes.
  # When >0, research.mode=hypothesis is enabled automatically.
  hypotheses: 0
  # code generation mode: legacy writes full ML scripts; autogluon_preprocess
  # asks the LLM for feature preprocessing only and uses a fixed AutoGluon runner
  mode: legacy
  # whether to instruct the agent to use CV (set to 1 to disable)
  k_fold_validation: 5
  # whether to instruct the agent to generate a prediction function
  expose_prediction: False
  # whether to provide the agent with a preview of the data
  data_preview: True
  # Global legacy Memory prompt budget: keep only this many latest step values.
  # Within that window, older entries are compacted to Design + Validation Metric.
  memory_recent_steps: 50
  # Number of latest step values inside memory_recent_steps that retain full
  # Results/Validity warning detail.
  memory_full_recent_steps: 10
  # Include the tail of the selected parent node's process_stdout.log in legacy
  # improvement prompts as empirical context from the previous execution.
  include_parent_process_stdout: True
  parent_process_stdout_max_bytes: 5000
  # whether legacy full-script prompts should prefer CUDA/GPU-capable tabular models
  gpu: false
  # auxiliary data mode:
  # false/off = normal competition files
  # true/merged/merge = use prebuilt train-aux/test-aux files as train/test
  # <file.csv|file.csv.gz> = expose one raw auxiliary CSV flat in workspace/input
  aux: false

  # LLM settings for coding
  code:
    model: gpt-5.4-mini
    temp: 0.5
    reasoning_effort: low
    timeout: 600
    web_search: false

  # LLM settings for evaluating program output / tracebacks
  feedback:
    model: gpt-5.4-mini
    temp: 0.5
    reasoning_effort: low

  # hyperparameters for the tree search
  search:
    max_debug_depth: 3
    debug_prob: 0.5
    num_drafts: 5
    # Number of generated-but-not-yet-executed code drafts to keep prepared.
    # 0 preserves the current linear generate -> execute -> generate behavior.
    code_ahead: 0
    exploration_weight: 0.0
    best_score_min_children_before_exploration: 5
    disable_oom_saturated_parents: false
    disable_timeout_debugging: true
    hypothesis_child_order: root_score
    # Hypothesis mode only: when set to a root hypothesis id, search only expands
    # that root subtree while keeping global best-score reporting intact.
    forced_root: null
    # Hypothesis mode only: when set to a hypothesis id, run/debug only that
    # exact hypothesis and do not create child-hypothesis branches.
    forced_hypothesis: null
    hypothesis_max_non_improving_children_per_parent: 10
    hypothesis_min_improvement_epsilon: 0.0002
    plateau_block_epsilon: 0.00001
    public_score_bonus_weight: 0.0
    public_score_bonus_cap: 0.0005

  autogluon:
    # Named profiles for the fixed AutoGluon runner.
    profile: s6e6_boost_gpu
    # Dedicated timeout for generated preprocess(df), separate from AutoGluon fit time_limit.
    preprocess_timeout: 600
    # Save diagnostic OOF/test predictions globally and for every fitted model.
    save_prediction_artifacts: true
    lightgbm_gpu_categorical_fallback:
      max_categorical_cardinality: 512
      action: fallback_to_cpu
    profiles:
      fast_boost:
        included_model_types: [XGB, GBM]
        presets: medium_quality
        time_limit: 600
        use_gpu: false
        validation_strategy: holdout
        fit_args:
          save_space: true
          fit_weighted_ensemble: false
          auto_stack: false
      # Fixed-family S6E7 screening profiles. Each requests exactly one
      # default configuration per required model family at equal priority so a
      # large source cannot spend the whole screening budget on GBM variants.
